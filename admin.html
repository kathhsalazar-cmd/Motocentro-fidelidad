<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin | Motocentro Salazar</title>

<style>

body{
font-family:Arial,sans-serif;
background:#111;
padding:20px;
}

.panel{
max-width:450px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
}

h1{
text-align:center;
color:#c00000;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
margin:15px 0;
}

.cliente{
background:#f5f5f5;
padding:15px;
border-radius:12px;
margin-top:15px;
}

button{
background:#c00000;
color:white;
border:0;
padding:12px;
border-radius:10px;
margin-top:10px;
width:100%;
font-weight:bold;
}

</style>

</head>


<body>


<div class="panel">

<h1>Motocentro Salazar</h1>

<h3>Buscar cliente</h3>

<input id="buscar" placeholder="Ingrese nombre">


<div id="resultado"></div>


</div>



<script type="module">


import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";


import { 
getFirestore,
collection,
getDocs,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";



const firebaseConfig = {
apiKey: "AIzaSyBsHY4BvPE2aE2Xk0WLVzWFn80IZ3B_Vck",
authDomain: "motocentro-salazar.firebaseapp.com",
projectId: "motocentro-salazar",
storageBucket: "motocentro-salazar.firebasestorage.app",
messagingSenderId: "400023502193",
appId: "1:400023502193:web:a0fe4ef6617de3a9508ad0"
};



const app = initializeApp(firebaseConfig);

const db = getFirestore(app);



let clientes=[];



async function cargarClientes(){

const datos = await getDocs(collection(db,"CLIENTES"));


datos.forEach((item)=>{

clientes.push({

id:item.id,
...item.data()

});

});

}


cargarClientes();



const buscar=document.getElementById("buscar");
const resultado=document.getElementById("resultado");



buscar.addEventListener("input",()=>{


let texto=buscar.value.toLowerCase();


resultado.innerHTML="";


clientes
.filter(c=>c.nombre.toLowerCase().includes(texto))
.forEach(c=>{


resultado.innerHTML += `


<div class="cliente">

<b>👤 ${c.nombre}</b><br>

📞 ${c.celular}<br>

✉️ ${c.correo}<br>

⭐ Puntos actuales: ${c.puntos || 0}


<button onclick="sumarPunto('${c.id}',${c.puntos || 0})">

➕ Agregar punto

</button>


</div>


`;


});


});



window.sumarPunto = async function(id,puntos){


const clienteRef = doc(db,"CLIENTES",id);


await updateDoc(clienteRef,{

puntos:puntos+1

});


alert("Punto agregado ✅");


location.reload();


}



</script>


</body>
</html>
