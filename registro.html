<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Cliente</title>

<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.form{
    background:white;
    color:black;
    padding:25px;
    border-radius:15px;
    width:90%;
    max-width:350px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#c00000;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="form">
<h2>Registro de Cliente</h2>

<input type="text" placeholder="Nombre">
<input type="email" placeholder="Correo">
<input type="password" placeholder="Contraseña">

<button>Crear cuenta</button>

</div>

</body>
</html>
