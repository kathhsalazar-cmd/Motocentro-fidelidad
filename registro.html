<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro</title>
</head>

<body style="font-family:Arial;background:#111;color:white;display:flex;justify-content:center;align-items:center;height:100vh;">

<div style="background:white;color:black;padding:20px;border-radius:15px;width:90%;max-width:350px;">

<h2>🏍️¡ÚNETE A NUESTRO PROGRAMA DE FIDELIDAD!🌟</h2>

<input id="nombre" placeholder="Nombres" style="width:100%;padding:10px;margin:10px 0;box-sizing:border-box;">
<input id="celular" placeholder="Número de celular" style="width:100%;padding:10px;margin:10px 0;box-sizing:border-box;">
<input id="correo" type="email" placeholder="Correo" style="width:100%;padding:10px;margin:10px 0;box-sizing:border-box;">
<input id="password" type="password" placeholder="Contraseña" style="width:100%;padding:10px;margin:10px 0;box-sizing:border-box;">
 
<button id="crearCuenta" style="width:100%;padding:12px;background:red;color:white;border:none;border-radius:8px;margin-top:10px;cursor:pointer;">
Crear cuenta
</button>

 <p>🎁CON MOTOCENTRO SALAZAR SIEMPRE GANAS🌟</p>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsHY4BvPE2aE2Xk0WLVzWFn80IZ3B_Vck",
  authDomain: "motocentro-salazar.firebaseapp.com",
  projectId: "motocentro-salazar",
  storageBucket: "motocentro-salazar.firebasestorage.app",
  messagingSenderId: "400023502193",
  appId: "1:400023502193:web:a0fe4ef6617de3a9508ad0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

document.getElementById("crearCuenta").addEventListener("click", async () => {

  const nombre = document.getElementById("nombre").value;
  const celular = document.getElementById("celular").value;
  const correo = document.getElementById("correo").value;
  const password = document.getElementById("password").value;

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, correo, password);
    const user = userCredential.user;

    await setDoc(doc(db, "CLIENTES", user.uid), {
      nombre: nombre,
      celular: celular,
      correo: correo,
      puntos: 0
    });

    alert("Cuenta creada con éxito 🎉");
    window.location.href = "tarjeta.html";

  } catch (error) {
    alert("Error: " + error.message);
  }

});
</script>
</body>
</html>
