<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjeta de Fidelidad | Motocentro Salazar</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
padding:20px;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:#fff;
width:100%;
max-width:430px;
border-radius:25px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.35);
}

.header{
background:linear-gradient(135deg,#c00000,#7a0000);
padding:25px;
text-align:center;
color:white;
}

.logo{
width:200px;
max-width:100%;
margin-bottom:15px;
}

.welcome{
font-size:24px;
font-weight:bold;
margin-top:10px;
}

.sub{
font-size:14px;
opacity:.9;
margin-top:5px;
}

.content{
padding:20px;
}

.user-box{
background:#f7f7f7;
border-radius:15px;
padding:15px;
margin-bottom:20px;
text-align:left;
}

.user-box h3{
color:#c00000;
margin-bottom:10px;
}

.user-info{
margin:8px 0;
font-size:14px;
}

.points-box{
background:#fff5f5;
border:2px solid #c00000;
border-radius:15px;
padding:15px;
text-align:center;
margin-bottom:20px;
}

.points-number{
font-size:32px;
font-weight:bold;
color:#c00000;
}

.points-text{
font-size:14px;
color:#555;
}

.sellos{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-top:20px;
margin-bottom:20px;
}

.sello{
width:55px;
height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
font-weight:bold;
font-size:18px;
border:2px solid #c00000;
background:white;
color:#c00000;
}

.completo{
background:#c00000;
color:white;
}

.recompensas{
margin-top:15px;
}

.reward{
background:#f7f7f7;
border-left:5px solid #c00000;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.reward-title{
font-weight:bold;
margin-bottom:3px;
}

.footer{
background:linear-gradient(135deg,#c00000,#7a0000);
color:white;
padding:20px;
text-align:center;
font-weight:bold;
font-size:16px;
}

</style>
</head>

<body>

<div class="card">

<div class="header">

<img src="logo.png" class="logo">

<div class="welcome" id="saludo">
Hola 👋
</div>

<div class="sub">
Programa de Fidelidad Motocentro Salazar
</div>

</div>

<div class="content">

<div class="user-box">

<h3>Información del Cliente</h3>

<div id="infoUsuario"></div>

</div>

<div class="points-box">

<div class="points-number" id="totalSellos">
0
</div>

<div class="points-text">
Sellos acumulados
</div>

</div>

<div class="sellos" id="sellosContainer">
</div>

<div class="recompensas">

<div class="reward">
<div class="reward-title">🎁 4 sellos</div>
Llavero gratis
</div>

<div class="reward">
<div class="reward-title">🎁 8 sellos</div>
10% de descuento en aceite
</div>

<div class="reward">
<div class="reward-title">🏆 10 sellos</div>
Cambio de aceite + filtro gratis
</div>

</div>

</div>

<div class="footer">
¡GRACIAS POR LA CONFIANZA!
</div>
<div id="premio" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.75);
align-items:center;
justify-content:center;
z-index:999;
">

<div style="
background:white;
padding:30px;
border-radius:20px;
text-align:center;
width:85%;
max-width:350px;
">

<h2 id="tituloPremio" style="color:#c00000;"></h2>

<p id="textoPremio"></p>

<button onclick="cerrarPremio()" style="
background:#c00000;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
margin-top:15px;
">
Aceptar
</button>

</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBsHY4BvPE2aE2Xk0WLVzWFn80IZ3B_Vck",
authDomain: "motocentro-salazar.firebaseapp.com",
projectId: "motocentro-salazar",
storageBucket: "motocentro-salazar.firebasestorage.app",
messagingSenderId: "400023502193",
appId: "1:400023502193:web:a0fe4ef6617de3a9508ad0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {

if(!user){
window.location.href = "login.html";
return;
}

try{

const ref = doc(db,"CLIENTES",user.uid);
const snap = await getDoc(ref);

if(snap.exists()){

const data = snap.data();

document.getElementById("saludo").innerHTML =
`Hola, ${data.nombre} 👋`;

document.getElementById("infoUsuario").innerHTML = `
<div class="user-info">📞 ${data.celular}</div>
<div class="user-info">✉️ ${data.correo}</div>
`;

const puntos = data.puntos || 0;
if(puntos >= 4 && !data.premio4Avisado){

mostrarPremio(
"🎊🎉 ¡FELICIDADES! 🎉🎊",
"🎁 Has completado 4 sellos. Ya puedes retirar tu llavero gratis en Motocentro Salazar 🏍️"
);

await updateDoc(ref,{
premio4Avisado:true
});

}
if(puntos >= 8 && !data.premio8Avisado){

    mostrarPremio(
        "🎉 ¡FELICIDADES! 🎉",
        "🏍️ Has obtenido un 10% de descuento en aceite."
    );

    await updateDoc(ref,{
        premio8Avisado:true
    });

}

if(puntos >= 10 && !data.premio10Avisado){

    mostrarPremio(
        "🏆 ¡GRAN PREMIO! 🏆",
        "Cambio de aceite + filtro GRATIS. ¡Gracias por tu fidelidad!"
    );

    await updateDoc(ref,{
        premio10Avisado:true
    });

}
document.getElementById("totalSellos").innerText = puntos;

let htmlSellos = "";

for(let i=1;i<=10;i++){

if(i <= puntos){

htmlSellos += `
<div class="sello completo">✓</div>
`;

}else{

htmlSellos += `
<div class="sello">${i}</div>
`;

}

}

document.getElementById("sellosContainer").innerHTML = htmlSellos;

}

}catch(error){

console.log(error);

}

});
function mostrarPremio(titulo,texto){

document.getElementById("tituloPremio").innerText = titulo;

document.getElementById("textoPremio").innerText = texto;

document.getElementById("premio").style.display = "flex";

}


window.cerrarPremio = function(){

document.getElementById("premio").style.display = "none";

  }
</script>

</body>
</html>
